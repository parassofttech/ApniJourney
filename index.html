<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
      <meta name="description" content="ApniJourney helps you explore amazing travel destinations and plan your journey easily." />

    <link rel="icon" type="image/svg+xml" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ApniJourney</title>
    <meta property="og:title" content="ApniJourney" />
  <meta property="og:description" content="Explore your own journey with us." />
  <meta property="og:image" content="https://apnijourney.com/logo.png" />
  <meta property="og:url" content="https://apnijourney.com" />
  <meta property="og:type" content="website" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script type="text/javascript">
    (function (l) {
      if (l.search[1] === "/") {
        var decoded = l.search
          .slice(1)
          .split("&")
          .map(function (s) {
            return s.replace(/~and~/g, "&");
          })
          .join("?");
        window.history.replaceState(
          null,
          null,
          l.pathname.slice(0, -1) + decoded + l.hash
        );
      }
    })(window.location);
  </script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "ApniJourney",
    "url": "https://apnijourney.com",
    "logo": "https://apnijourney.com/logo.png"
  }
  </script>
  </body>
</html>
